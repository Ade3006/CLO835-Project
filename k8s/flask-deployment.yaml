apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: final
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      serviceAccountName: clo835
      containers:
        - name: flask-app
          image: 432795166334.dkr.ecr.us-east-1.amazonaws.com/clo835-final-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 81
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-secret
